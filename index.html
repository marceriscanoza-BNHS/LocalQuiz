<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArUco Quiz System</title>
    
    <script src="https://cdn.jsdelivr.net/gh/damianofalcioni/js-aruco2@master/src/cv.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/damianofalcioni/js-aruco2@master/src/aruco.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/damianofalcioni/js-aruco2@master/src/svggen.js"></script>

    <style>
        :root {
            --bg-color: #f4f6f9;
            --card-bg: #ffffff;
            --primary: #2563eb;
            --text: #1e293b;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: var(--bg-color);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 600px;
            background: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: #e2e8f0;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
        }
        .tab-btn.active {
            background: var(--primary);
            color: white;
        }
        .panel { display: none; }
        .panel.active { display: block; }
        
        .form-group { margin-bottom: 12px; }
        label { font-weight: 600; font-size: 0.9rem; }
        input, button {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            box-sizing: border-box;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
        }
        button {
            background: var(--primary);
            color: white;
            font-weight: bold;
            cursor: pointer;
            border: none;
        }

        /* Printable Quiz Card Styling */
        #printCardArea {
            margin-top: 25px;
            display: flex;
            justify-content: center;
        }
        .quiz-card {
            width: 260px;
            height: 320px;
            border: 3px dashed #000;
            background: #fff;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            position: relative;
            box-sizing: border-box;
            color: #000;
        }
        .student-name-tag {
            font-size: 1.3rem;
            font-weight: bold;
            text-transform: uppercase;
            border-bottom: 2px solid #000;
            width: 100%;
            text-align: center;
            padding-bottom: 5px;
        }
        .marker-wrapper {
            position: relative;
            width: 160px;
            height: 160px;
        }
        .marker-wrapper svg { width: 100%; height: 100%; }
        .letter-label {
            position: absolute;
            font-weight: 900;
            font-size: 1.6rem;
        }
        .letter-label.A { top: -30px; left: 50%; transform: translateX(-50%); }
        .letter-label.B { right: -30px; top: 50%; transform: translateY(-50%); }
        .letter-label.C { bottom: -30px; left: 50%; transform: translateX(-50%); }
        .letter-label.D { left: -30px; top: 50%; transform: translateY(-50%); }

        /* Scanner Feed */
        video { width: 100%; border-radius: 8px; background: #000; }
        #scanResult {
            margin-top: 15px;
            padding: 15px;
            background: #f1f5f9;
            border-left: 4px solid var(--primary);
            font-size: 1.1rem;
        }
        .roster-info { font-weight: bold; color: var(--primary); }
    </style>
</head>
<body>

<div class="container">
    <h2>ArUco Quiz Hub</h2>
    
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('generator')">Card Generator</button>
        <button class="tab-btn" onclick="switchTab('scanner')">Quiz Scanner</button>
    </div>

    <div id="generator" class="panel active">
        <h3>Create Student Quiz Card</h3>
        <div class="form-group">
            <label for="studentName">Student Name:</label>
            <input type="text" id="studentName" value="John Doe" placeholder="e.g. Alice Smith">
        </div>
        <div class="form-group">
            <label for="markerId">Assigned Marker ID (0 - 100):</label>
            <input type="number" id="markerId" value="1" min="0" max="100">
        </div>
        <button onclick="generateQuizCard()">Generate & Print Layout</button>
        
        <div id="printCardArea">
            </div>
    </div>

    <div id="scanner" class="panel">
        <h3>Scan Responses</h3>
        <video id="webcam" autoplay playsinline muted></video>
        <div id="scanResult">Status: Scanner Idle</div>
    </div>
</div>

<script>
    // --- CLASS ROSTER CONFIGURATION ---
    // Match Marker IDs to your actual students here!
    const studentRoster = {
        0: "Alice",
        1: "John Doe",
        2: "Charlie",
        3: "Emily",
        4: "Michael"
    };

    // --- TAB SYSTEM ---
    function switchTab(tabId) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        
        document.getElementById(tabId).classList.add('active');
        event.target.classList.add('active');

        if (tabId === 'scanner') { startCamera(); } else { stopCamera(); }
    }

    // --- GENERATOR LOGIC ---
    function generateQuizCard() {
        const name = document.getElementById('studentName').value.trim() || "STUDENT";
        const id = parseInt(document.getElementById('markerId').value) || 0;
        const container = document.getElementById('printCardArea');
        
        if (typeof AR === 'undefined') {
            container.innerHTML = "<p style='color:red;'>Error: Libraries not ready.</p>";
            return;
        }

        const dictionary = new AR.Dictionary("ARUCO");
        const svgCode = dictionary.generateSVG(id);

        // Build a structured, printable card with directional labels
        container.innerHTML = `
            <div class="quiz-card">
                <div class="student-name-tag">${name}</div>
                <div class="marker-wrapper">
                    <span class="letter-label A">A</span>
                    <span class="letter-label B">B</span>
                    <span class="letter-label C">C</span>
                    <span class="letter-label D">D</span>
                    ${svgCode}
                </div>
                <div style="font-size:0.75rem; color:#666;">Hold selected answer pointing UP</div>
            </div>
        `;
    }

    // --- SCANNER & ORIENTATION DETECTION LOGIC ---
    let videoStream = null;
    let animationFrameId = null;
    let detector = null;
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');

    async function startCamera() {
        const video = document.getElementById('webcam');
        const resultDiv = document.getElementById('scanResult');
        
        if (!detector) { detector = new AR.Detector({ dictionaryName: 'ARUCO' }); }

        try {
            videoStream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "environment" } 
            });
            video.srcObject = videoStream;
            resultDiv.innerText = "Status: Ready to scan student answers...";
            animationFrameId = requestAnimationFrame(tick);
        } catch (err) {
            resultDiv.innerText = "Error: Camera unavailable.";
        }
    }

    function stopCamera() {
        if (videoStream) { videoStream.getTracks().forEach(track => track.stop()); }
        if (animationFrameId) { cancelAnimationFrame(animationFrameId); }
        document.getElementById('scanResult').innerText = "Status: Scanner Idle";
    }

    function tick() {
        const video = document.getElementById('webcam');
        const resultDiv = document.getElementById('scanResult');

        if (video.readyState === video.HAVE_ENOUGH_DATA) {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const markers = detector.detect(imageData);

            if (markers.length > 0) {
                const marker = markers[0];
                const id = marker.id;
                const c = marker.corners; // Contains 4 tracking corners: [top-left, top-right, bottom-right, bottom-left]

                // Look up student name from our roster dictionary
                const studentName = studentRoster[id] || `Unknown Student (ID: ${id})`;

                // --- ORIENTATION MATH ---
                // We calculate the midpoints of the 4 original edges of the marker grid.
                // In a browser video frame, Y = 0 is the ceiling. 
                // Whichever edge midpoint has the LOWEST Y value is physically pointing straight up!
                const topMidpointY    = (c[0].y + c[1].y) / 2;
                const rightMidpointY  = (c[1].y + c[2].y) / 2;
                const bottomMidpointY = (c[2].y + c[3].y) / 2;
                const leftMidpointY   = (c[3].y + c[0].y) / 2;

                let detectedAnswer = "A";
                let minY = topMidpointY;

                if (rightMidpointY < minY) { detectedAnswer = "B"; minY = rightMidpointY; }
                if (bottomMidpointY < minY) { detectedAnswer = "C"; minY = bottomMidpointY; }
                if (leftMidpointY < minY) { detectedAnswer = "D"; minY = leftMidpointY; }

                // Output Result
                resultDiv.innerHTML = `
                    Scan Registered:<br>
                    <span class="roster-info">${studentName}</span> chose Answer: <strong>${detectedAnswer}</strong>
                `;
            }
        }
        animationFrameId = requestAnimationFrame(tick);
    }
</script>
</body>
</html>
