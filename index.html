<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline ArUco Toolkit</title>
    
    <script src="libs/cv.js"></script>
    <script src="libs/aruco.js"></script>
    <script src="libs/svggen.js"></script>

    <style>
        :root {
            --bg-color: #f4f6f9;
            --card-bg: #ffffff;
            --primary: #2563eb;
            --text: #1e293b;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: var(--bg-color);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 600px;
            background: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: #e2e8f0;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
        }
        .tab-btn.active {
            background: var(--primary);
            color: white;
        }
        .panel { display: none; }
        .panel.active { display: block; }
        
        /* Generator Styling */
        .form-group { margin-bottom: 15px; }
        input, button {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            box-sizing: border-box;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
        }
        button {
            background: var(--primary);
            color: white;
            font-weight: bold;
            cursor: pointer;
            border: none;
        }
        #resultSvg {
            margin-top: 20px;
            display: flex;
            justify-content: center;
        }
        #resultSvg svg { width: 200px; height: 200px; }

        /* Scanner Styling */
        video {
            width: 100%;
            border-radius: 8px;
            background: #000;
            transform: scaleX(-1); /* Mirror view for natural interaction */
        }
        #scanResult {
            margin-top: 15px;
            padding: 12px;
            background: #f1f5f9;
            border-left: 4px solid var(--primary);
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>ArUco Utility Hub</h2>
    
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('generator')">Generator</button>
        <button class="tab-btn" onclick="switchTab('scanner')">Scanner</button>
    </div>

    <div id="generator" class="panel active">
        <h3>Generate Marker</h3>
        <div class="form-group">
            <label for="markerId">Marker ID (0 - 1022):</label>
            <input type="number" id="markerId" value="0" min="0" max="1022">
        </div>
        <button onclick="generateMarker()">Generate SVG</button>
        <div id="resultSvg"></div>
    </div>

    <div id="scanner" class="panel">
        <h3>Live Scanner</h3>
        <video id="webcam" autoplay playsinline></video>
        <div id="scanResult">Status: Scanner Idle</div>
    </div>
</div>

<script>
    // --- TAB NAVIGATION ---
    function switchTab(tabId) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        
        document.getElementById(tabId).classList.add('active');
        event.target.classList.add('active');

        if (tabId === 'scanner') {
            startCamera();
        } else {
            stopCamera();
        }
    }

    // --- GENERATOR LOGIC ---
    function generateMarker() {
        const id = parseInt(document.getElementById('markerId').value) || 0;
        const container = document.getElementById('resultSvg');
        
        // Uses js-aruco2's built-in SVG generator (Standard 7x7 ARUCO dictionary)
        const dictionary = new AR.Dictionary("ARUCO");
        container.innerHTML = dictionary.generateSVG(id);
    }

    // --- SCANNER LOGIC ---
    let videoStream = null;
    let animationFrameId = null;
    let detector = null;
    
    // Off-screen canvas helper for extracting video frames locally
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');

    async function startCamera() {
        const video = document.getElementById('webcam');
        const resultDiv = document.getElementById('scanResult');
        
        // Initialize ArUco Detector if not already done
        if (!detector) {
            detector = new AR.Detector({ dictionaryName: 'ARUCO' });
        }

        try {
            videoStream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "environment" } 
            });
            video.srcObject = videoStream;
            resultDiv.innerText = "Status: Scanning...";
            animationFrameId = requestAnimationFrame(tick);
        } catch (err) {
            resultDiv.innerText = "Error: Camera access denied or unavailable.";
            console.error(err);
        }
    }

    function stopCamera() {
        if (videoStream) {
            videoStream.getTracks().forEach(track => track.stop());
        }
        if (animationFrameId) {
            cancelAnimationFrame(animationFrameId);
        }
        document.getElementById('scanResult').innerText = "Status: Scanner Idle";
    }

    function tick() {
        const video = document.getElementById('webcam');
        const resultDiv = document.getElementById('scanResult');

        if (video.readyState === video.HAVE_ENOUGH_DATA) {
            // Match canvas size to video frame stream
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            
            // Draw current video frame to hidden canvas
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            // Extract pure pixel data from canvas
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            
            // Run the offline detection algorithm
            const markers = detector.detect(imageData);

            if (markers.length > 0) {
                // Grab the ID of the first detected marker
                resultDiv.innerText = `Detected Marker ID: ${markers[0].id}`;
            } else {
                resultDiv.innerText = "Status: Scanning (No marker found)...";
            }
        }
        animationFrameId = requestAnimationFrame(tick);
    }
</script>
</body>
</html>
